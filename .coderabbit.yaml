language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/pnpm-lock.yaml"
    - "!**/package-lock.json"
    - "!**/__pycache__/**"
    - "!**/*.pyc"
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
