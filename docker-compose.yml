services:
  api:
    build: ./packages/api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api:/app

  web:
    build: ./packages/web
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./packages/web:/app

  worker:
    build: ./packages/api
    command: celery -A app.worker worker --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api:/app

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: magnet
      POSTGRES_USER: magnet
      POSTGRES_PASSWORD: magnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magnet -d magnet"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  test_db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: magnet_test
      POSTGRES_USER: magnet
      POSTGRES_PASSWORD: magnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magnet -d magnet_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

volumes:
  pgdata:
  minio_data:
